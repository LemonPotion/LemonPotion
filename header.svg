    letter-spacing="-0.5">Building backends.</text>

  <!-- Main title line 2 — italic accent -->
  <text 
    x="430" y="150"
    font-family="'Playfair Display', Georgia, serif"
    font-size="52"
    font-weight="400"
    font-style="italic"
    fill="#cf6a45"
    text-anchor="middle"
    letter-spacing="-0.5">One commit at a time.</text>

  <!-- Subtitle -->
  <text
    x="430" y="194"
    font-family="'Inter', system-ui, sans-serif"
    font-size="14"
    font-weight="300"
    fill="#6e6a65"
    text-anchor="middle"
    letter-spacing="2">JUNIOR .NET BACKEND DEVELOPER  ·  TIRASPOL, PMR</text>
</svg>
